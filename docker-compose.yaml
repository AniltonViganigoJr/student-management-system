services:
  postgres:
    image: postgres:16-alpine
    container_name: my_school_app-postgres
    restart: always
    environment:
      POSTGRES_DB: myschool
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: post12345
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - my_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d myschool"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local

networks:
  my_network:
